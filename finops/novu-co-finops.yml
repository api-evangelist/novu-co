meters:
- name: workflow_runs
  description: Workflow trigger events executed on Novu Cloud; each run can fan out across channels. Billed via base allowance plus overage per 1,000.
  unit: events
  aggregation: sum
  dimensions:
  - account
  - environment
  - workflow
- name: overage_runs
  description: Workflow runs above the plan's monthly allowance, billed at $1.20 per 1,000 on Pro and Team.
  unit: events
  aggregation: sum
  dimensions:
  - account
  - environment
- name: downstream_provider_cost
  description: Fees charged by the underlying channel providers (email/SMS/push/chat) that Novu orchestrates. Billed by those providers, not Novu.
  unit: messages
  aggregation: sum
  dimensions:
  - channel
  - providerId
- name: self_hosted_compute
  description: Infrastructure cost of running self-hosted Novu services (API, worker, WebSocket) - no Novu invoice.
  unit: hours
  aggregation: sum
  dimensions:
  - deployment
principles:
- name: Visibility
  description: Track workflow-run volume per environment and workflow against the plan allowance; separately monitor downstream provider (email/SMS/push) costs which dominate at scale.
- name: Allocation
  description: Use environments, workflow names, and topics to map run volume to teams, features, and cost centers.
- name: Optimization
  description: Consolidate notifications into single multi-channel workflows, use digest/aggregation steps to reduce message volume, gate low-value channels via subscriber preferences, and self-host to trade Cloud fees for owned infrastructure at high volume.
- name: Accountability
  description: Assign owners per workflow/environment; review monthly runs against the tier allowance and overage, and reconcile downstream provider invoices.
