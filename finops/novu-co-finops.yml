description: >-
  FinOps view of Novu spend. Novu's core notification infrastructure is open
  source (MIT) and free to self-host - in that model the cost is your own
  compute, storage, and network for running the Novu services (API, worker,
  WebSocket) plus the fees of the downstream channel providers (SendGrid,
  Twilio, FCM, APNs, Slack, etc.), with no Novu invoice. Novu Cloud is the
  managed offering, billed on workflow-run (event) volume: a base subscription
  that includes a monthly run allowance, plus overage at $1.20 per 1,000
  additional runs on Pro and Team. Subscribers (recipients / MAU) are unlimited
  and not metered. Enterprise agreements cover very high volume (10M+ runs/mo)
  and advanced controls.
notes: >-
  The metered unit is the workflow run (one trigger event that can fan out
  across channels), not MAU - subscribers are unlimited on all Cloud tiers. Two
  cost centers to watch: Novu Cloud run volume/overage, and the downstream
  provider costs (email/SMS/push) which Novu orchestrates but does not bill.
  Verify current rates on the Novu pricing page.
