aid: novu-co
url: https://raw.githubusercontent.com/api-evangelist/novu-co/refs/heads/main/apis.yml
name: Novu
kind: company
description: Novu is open-source notification infrastructure that sends multi-channel
  messages - email, SMS, push, chat, and an in-app Inbox - from a single workflow
  trigger. A single event API call fans a notification out across channels defined
  in a workflow, with subscriber management, topics, layouts, digest/aggregation,
  55+ provider integrations, and a real-time embeddable Inbox notification center
  powered by a WebSocket connection. Novu is self-hostable (MIT) and also available
  as Novu Cloud, with US (api.novu.co) and EU (eu.api.novu.co) regions.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Notifications
- Multi-Channel
- Email
- SMS
- Push
- Chat
- In-App Inbox
- Open Source
- WebSocket
created: '2026-07-02'
modified: '2026-07-02'
