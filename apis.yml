    to browser and mobile clients - notification_received, unseen_count_changed, and
    unread_count_changed events - authenticated by subscriberId, applicationIdentifier,
    and an HMAC subscriber hash. Powers the embeddable Inbox component's live bell,
    counts, and feed.
